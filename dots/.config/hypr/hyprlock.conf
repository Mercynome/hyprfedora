# ==============================================================================
# HYPRLOCK CONFIGURATION - TOKYO NIGHT THEME
# ==============================================================================

# ------------------------------------------------------------------------------
# BACKGROUND
# ------------------------------------------------------------------------------
background {
    monitor =
    path = screenshot # This takes a screenshot of the current workspace
    
    # Blur effects (Liquid Glass theme)
    blur_passes = 4
    blur_size = 7
    noise = 0.01
    contrast = 1.05
    brightness = 1.1
    vibrancy = 0.35
    vibrancy_darkness = 0.2
}

# ------------------------------------------------------------------------------
# INPUT FIELD (PASSWORD)
# ------------------------------------------------------------------------------
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.33 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.15 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    dots_rounding = -1 # -1 default circle, -2 follow input-field rounding
    outer_color = rgba(255, 255, 255, 0.3) # Light Glass Border
    inner_color = rgba(255, 255, 255, 0.1) # Highly Transparent Glass
    font_color = rgb(255, 255, 255) # White Text for contrast over dark blur
    fade_on_empty = true
    fade_timeout = 1000 # Milliseconds before fade_on_empty is triggered.
    placeholder_text = <i>Input Password...</i> # Text rendered in the input box when it's empty.
    hide_input = false
    rounding = -1 # -1 means complete rounding (circle/oval)
    check_color = rgba(255, 255, 255, 0.6)  # Frostier glass for checking
    fail_color = rgb(255, 59, 48)   # iOS Red for fail
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i> # can be set to empty
    fail_transition = 300 # transition time in ms between normal outer_color and fail_color
    capslock_color = -1
    numlock_color = -1
    bothlock_color = -1 # when both locks are active. -1 means don't change outer color (same for above)
    invert_numlock = false # change color if numlock is off
    swap_font_color = false # see below

    position = 0, -20
    halign = center
    valign = center
}

# ------------------------------------------------------------------------------
# TIME (CLOCK)
# ------------------------------------------------------------------------------
label {
    monitor =
    text = $TIME
    color = rgb(255, 255, 255)
    font_size = 90
    font_family = Inter Bold
    
    # Shadow for depth
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(0, 0, 0, 0.8)

    position = 0, 200
    halign = center
    valign = center
}

# ------------------------------------------------------------------------------
# USERNAME & GREETING
# ------------------------------------------------------------------------------
label {
    monitor =
    text = Welcome, $USER
    color = rgb(255, 255, 255)
    font_size = 20
    font_family = Inter

    shadow_passes = 1
    shadow_size = 2
    shadow_color = rgba(0, 0, 0, 0.8)

    position = 0, 80
    halign = center
    valign = center
}
