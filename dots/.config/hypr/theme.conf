# Anime Glassmorphism - Hyprland decoration overrides
decoration {
    rounding = 14
    active_opacity = 0.84
    inactive_opacity = 0.78

    shadow {
        enabled = true
        range = 30
        render_power = 3
        color = rgba(000000cc)
    }

    blur {
        enabled = true
        size = 7
        passes = 4
        new_optimizations = true
        xray = false
        vibrancy = 0.35
        vibrancy_darkness = 0.2
        noise = 0.01
        contrast = 1.05
        brightness = 1.1
        popups = true
    }
}

general {
    gaps_in = 5
    gaps_out = 12
    border_size = 2
    col.active_border = rgba(ffffffaa) rgba(ffffff1a) rgba(ffffffaa) rgba(ffffff1a) 45deg
    col.inactive_border = rgba(ffffff0d)
}


# BU BLUR ÇALIŞAN BLUR DEĞİŞTİRİLEMEZ
layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.2, match:namespace waybar

layerrule = blur on, match:namespace quickshell
layerrule = ignore_alpha 0.1, match:namespace quickshell

layerrule = blur on, match:namespace launcher
layerrule = ignore_alpha 0.1, match:namespace launcher

layerrule = blur on, match:namespace swaync-control-center
layerrule = ignore_alpha 0.1, match:namespace swaync-control-center

layerrule = blur on, match:namespace swaync-notification-window
layerrule = ignore_alpha 0.1, match:namespace swaync-notification-window
layerrule = blur on, match:namespace logout_dialog
layerrule = ignore_alpha 0.1, match:namespace logout_dialog

layerrule = blur on, match:namespace rofi
layerrule = ignore_alpha 0.1, match:namespace rofi
