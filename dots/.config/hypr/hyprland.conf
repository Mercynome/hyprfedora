# ==============================================================================
# 🌟 ÖZEL HYPRLAND KONFİGÜRASYONU 🌟
# ==============================================================================
# Bu dosya tamamen sıfırdan, anlaşılır ve hyprKCS ile uyumlu olması için yazılmıştır.
# Tüm ayarları arayüzden (hyprKCS) değiştirebilirsin.

# -----------------------------------------------------
# MONİTÖR AYARLARI
# -----------------------------------------------------
monitor=,2560x1440@144,auto,1

# -----------------------------------------------------
# OTOMATİK BAŞLATILANLAR (AUTOSTART)
# -----------------------------------------------------
exec-once = quickshell &
exec-once = ~/.config/quickshell/stats.sh &
exec-once = swww-daemon &
exec-once = swaync &
exec-once = hypridle &
exec-once = /usr/libexec/hyprpolkitagent &
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Slow app launch fix
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP &
exec-once = hash dbus-update-activation-environment 2>/dev/null &
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP &

# -----------------------------------------------------
# ÇEVRE DEĞİŞKENLERİ (ENVIRONMENT VARIABLES)
# -----------------------------------------------------
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = QML_XHR_ALLOW_FILE_READ,1
env = QT_QPA_PLATFORMTHEME,qt6ct
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# Uygulamalar için Wayland zorlamaları
env = GDK_BACKEND,wayland,x11
env = QT_QPA_PLATFORM,wayland;xcb
env = CLUTTER_BACKEND,wayland
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# NVIDIA Optimizasyonları
env = LIBVA_DRIVER_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = WLR_NO_HARDWARE_CURSORS,1
env = NVD_BACKEND,direct

# -----------------------------------------------------
# GÖRÜNÜM VE TASARIM (LOOK AND FEEL)
# -----------------------------------------------------
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 1.0
    
    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 8
        passes = 2
        vibrancy = 0.1696
        new_optimizations = true
        ignore_opacity = true
    }
}

animations {
    enabled = true
    
    # Premium Liquid / Bouncy Curves
    bezier = overshot, 0.05, 0.9, 0.1, 1.1   # Sadece pencerelerin hareketi için
    bezier = smoothOut, 0.5, 0, 0.99, 0.99   
    bezier = linear, 0.0, 0.0, 1.0, 1.0      
    bezier = strictFade, 0.1, 1.0, 0.1, 1.0  # Opaklık için GÜVENLİ (taşmayan) eğri
    
    animation = windows, 1, 6, overshot, slide
    # Pencere Kapanışı (Açılıştaki o mükemmel bouncy/kayma hissinin birebir aynısı)
    animation = windowsOut, 1, 6, overshot, slide
    animation = windowsMove, 1, 5, overshot
    animation = border, 1, 5, default
    animation = borderangle, 1, 150, linear, loop
    animation = fade, 1, 5, strictFade
    animation = fadeDim, 1, 5, strictFade
    # Masaüstü Geçişi (Sevdiğin bouncy hissiyle tamamen aynı şekilde kayar)
    animation = workspaces, 1, 6, overshot, slide
}

dwindle {
    preserve_split = true
}



misc {
    disable_hyprland_logo = true
}

# -----------------------------------------------------
# GİRDİ (INPUT)
# -----------------------------------------------------
input {
    kb_layout = tr
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
    sensitivity = 0
}

# -----------------------------------------------------
# KISAYOLLAR (KEYBINDINGS)
# Not: Bu kısım hyprKCS aracı ile GUI üzerinden düzenlenebilir!
# -----------------------------------------------------
$mainMod = SUPER

# == KLAVYE KISAYOLLARI ==
# ---------------------------------------------------------
bind = $mainMod, Return, exec, kitty
bind = SUPER, Q, killactive

# 60% Klavyeler için Ctrl+Alt'ı AltGr gibi kullanma (Türkçe Q Klavye Uyumlu)
bind = CTRL ALT, Q, exec, sleep 0.1 && wtype "@"
bind = CTRL ALT, 1, exec, sleep 0.1 && wtype ">"
bind = CTRL ALT, 2, exec, sleep 0.1 && wtype "£"
bind = CTRL ALT, 3, exec, sleep 0.1 && wtype -k numbersign
bind = CTRL ALT, 4, exec, sleep 0.1 && wtype "$"
bind = CTRL ALT, 5, exec, sleep 0.1 && wtype "½"
bind = CTRL ALT, 6, exec, sleep 0.1 && wtype "¾"
bind = CTRL ALT, 7, exec, sleep 0.1 && wtype "{"
bind = CTRL ALT, 8, exec, sleep 0.1 && wtype "["
bind = CTRL ALT, 9, exec, sleep 0.1 && wtype "]"
bind = CTRL ALT, 0, exec, sleep 0.1 && wtype "}"
bind = CTRL ALT, asterisk, exec, sleep 0.1 && wtype "\\"
bind = CTRL ALT, minus, exec, sleep 0.1 && wtype "|"
bind = CTRL ALT, less, exec, sleep 0.1 && wtype "|"
bind = CTRL ALT, udiaeresis, exec, sleep 0.1 && wtype "~"
bind = CTRL ALT, E, exec, sleep 0.1 && wtype "€"
bind = CTRL ALT, T, exec, sleep 0.1 && wtype "₺"
bind = CTRL ALT, A, exec, sleep 0.1 && wtype "æ"
bind = CTRL ALT, S, exec, sleep 0.1 && wtype "ß"
bind = $mainMod, M, exit
bind = $mainMod, L, exec, hyprlock
bind = SUPER, E, exec, thunar
bind = $mainMod, Space, togglefloating
bind = $mainMod, R, exec, rofi -show drun
bind = $mainMod, W, exec, rofimoji --action copy --hidden-descriptions --selector-args="-theme-str 'listview { columns: 8; lines: 5; } element-text { font: \"sans-serif 40\"; horizontal-align: 0.5; } window { width: 50%; }'"
bind = $mainMod, K, exec, ~/.cargo/bin/hyprkcs
bind = $mainMod, I, exec, nwg-look
bind = $mainMod, P, exec, waypaper
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, Escape, exec, wlogout -B 400 -T 400 -R 800 -L 800

# 🎨 TEMA DEĞİŞTİRİCİ

# Pencere Yönetimi
bind = $mainMod, F, fullscreen

# 📸 EKRAN GÖRÜNTÜSÜ ALMA (Win + Shift + S) -> Panoya kopyalar ve Satty ile düzenleme açar
bind = $mainMod SHIFT, S, exec, sh -c 'hyprshot -m region --clipboard-only | satty --filename -'

# Pano Geçmişi (Cliphist + Rofi + Resim Desteği)
bind = $mainMod, V, exec, ~/.config/hypr/scripts/cliphist-rofi-img

# 😀 Emoji Seçici (rofimoji)

# 🎨 Renk Damlalığı ve Geçmişi
bind = $mainMod, c, exec, ~/.config/hypr/scripts/color-picker.sh

# 🔊 Ses Kontrolleri (OSD göstergeli)
bindel = , XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/osd-trigger.sh vol-up
bindel = , XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/osd-trigger.sh vol-down
bindl = , XF86AudioMute, exec, ~/.config/hypr/scripts/osd-trigger.sh vol-mute

# ☀️ Parlaklık Kontrolleri (OSD göstergeli)
bindel = , XF86MonBrightnessUp, exec, ~/.config/hypr/scripts/osd-trigger.sh bright-up
bindel = , XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/osd-trigger.sh bright-down

# 🎵 Medya Kontrolleri
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

bind = $mainMod, J, layoutmsg, togglesplit # Pencere bölme yönünü (yatay/dikey) değiştirir

# Pencereler Arası Geçiş (Odaklanma)
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Çalışma Alanları (Workspaces)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Aktif Pencereyi Çalışma Alanına Taşıma
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Move/resize windows with mainMod + LMB/RMB and dragging

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Window Rules hyprKCS üzerinden eklenebilir.

# -----------------------------------------------------
# TEMA OVERRIDE (theme-switch betiği tarafından güncellenir)
# -----------------------------------------------------
source = ~/.config/hypr/theme.conf

# Dinamik Renk Sistemi (matugen tarafından otomatik güncellenir)
source = ~/.config/hypr/colors.conf

# PENCERE KURALLARI (WINDOW RULES)
# -----------------------------------------------------

