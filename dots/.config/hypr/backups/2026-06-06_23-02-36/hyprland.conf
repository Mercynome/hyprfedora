# ==============================================================================
# 🌟 ÖZEL HYPRLAND KONFİGÜRASYONU 🌟
# ==============================================================================
# Bu dosya tamamen sıfırdan, anlaşılır ve hyprKCS ile uyumlu olması için yazılmıştır.
# Tüm ayarları arayüzden (hyprKCS) değiştirebilirsin.

# -----------------------------------------------------
# MONİTÖR AYARLARI
# -----------------------------------------------------
monitor=,2560x1440@144,auto,1

# -----------------------------------------------------
# OTOMATİK BAŞLATILANLAR (AUTOSTART)
# -----------------------------------------------------
exec-once = waybar &
exec-once = awww daemon &
exec-once = swaync &
exec-once = hypridle &
exec-once = /usr/libexec/hyprpolkitagent &
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Slow app launch fix
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP &
exec-once = hash dbus-update-activation-environment 2>/dev/null &
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP &

# -----------------------------------------------------
# ÇEVRE DEĞİŞKENLERİ (ENVIRONMENT VARIABLES)
# -----------------------------------------------------
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# Uygulamalar için Wayland zorlamaları
env = GDK_BACKEND,wayland,x11
env = QT_QPA_PLATFORM,wayland;xcb
env = CLUTTER_BACKEND,wayland
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# NVIDIA Optimizasyonları
env = LIBVA_DRIVER_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = WLR_NO_HARDWARE_CURSORS,1
env = NVD_BACKEND,direct

# -----------------------------------------------------
# GÖRÜNÜM VE TASARIM (LOOK AND FEEL)
# -----------------------------------------------------
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 10
    active_opacity = 0.95
    inactive_opacity = 0.90
    
    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 8
        passes = 2
        vibrancy = 0.1696
    }
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    preserve_split = true
}



misc {
    disable_hyprland_logo = true
}

# -----------------------------------------------------
# GİRDİ (INPUT)
# -----------------------------------------------------
input {
    kb_layout = tr
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
    sensitivity = 0
}

# -----------------------------------------------------
# KISAYOLLAR (KEYBINDINGS)
# Not: Bu kısım hyprKCS aracı ile GUI üzerinden düzenlenebilir!
# -----------------------------------------------------
$mainMod = SUPER

# Temel Uygulamalar
bind = $mainMod, Return, exec, kitty
bind = SUPER, Q, killactive
bind = $mainMod, M, exit
bind = SUPER, E, exec, dolphin
bind = $mainMod, Space, togglefloating
bind = $mainMod, R, exec, fuzzel
bind = $mainMod, K, exec, ~/.cargo/bin/hyprkcs
bind = $mainMod, I, exec, nwg-look
bind = $mainMod, P, exec, waypaper
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, Escape, exec, wlogout

# Tema Değiştirme (Theme Switcher)
bind = $mainMod, T, exec, ~/Belgeler/Dotfiles/my-hypr-dots/scripts/theme-switch

# Pencere Yönetimi
bind = $mainMod, F, fullscreen

# Ekran Görüntüsü (hyprshot + satty)
bind = $mainMod SHIFT, S, exec, sh -c 'hyprshot -m region --clipboard-only | satty --filename -'

# Pano Geçmişi (Cliphist + Fuzzel)
bind = $mainMod, V, exec, sh -c 'cliphist list | fuzzel --dmenu | cliphist decode | wl-copy'
bind = $mainMod, J, layoutmsg, togglesplit # Pencere bölme yönünü (yatay/dikey) değiştirir

# Pencereler Arası Geçiş (Odaklanma)
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Çalışma Alanları (Workspaces)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Aktif Pencereyi Çalışma Alanına Taşıma
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Fare ile Pencere Taşıma/Boyutlandırma
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Window Rules hyprKCS üzerinden eklenebilir.

# -----------------------------------------------------
# TEMA OVERRIDE (theme-switch betiği tarafından güncellenir)
# -----------------------------------------------------
source = ~/.config/hypr/theme.conf
