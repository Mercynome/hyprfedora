[main]
font=Noto Sans:weight=medium:size=14,Ubuntu:weight=medium:size=14,sans-serif:weight=medium:size=14
dpi-aware=auto
prompt="Search: "
icon-theme=Papirus
icons-enabled=yes
fields=filename,name,generic
password-character=*
match-mode=fzf
show-actions=yes
terminal=kitty -e

lines=10
width=40
horizontal-pad=30
vertical-pad=30
inner-pad=20

image-size-ratio=0.5
line-height=40
letter-spacing=0

[colors]
background=ffffffa6
text=1d1d1fff
match=007affff
selection=0000001a
selection-text=1d1d1fff
selection-match=007affff
border=ffffffb3

[border]
width=1
radius=40
selection-radius=20
