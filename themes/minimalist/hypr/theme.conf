# Minimalist Dark - Hyprland decoration overrides
decoration {
    rounding = 8
    active_opacity = 1.0
    inactive_opacity = 0.92

    shadow {
        enabled = false
    }

    blur {
        enabled = false
    }
}

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 1
    col.active_border = rgba(b4befebb)
    col.inactive_border = rgba(45475a55)
}
