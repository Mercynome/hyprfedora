[main]
font=DM Sans:size=12
dpi-aware=auto
prompt=› 
icon-theme=Papirus
icons-enabled=yes
fields=filename,name,generic
password-character=•
fuzzy=yes
show-actions=yes
terminal=kitty -e

lines=10
width=40
horizontal-pad=20
vertical-pad=20
inner-pad=10

image-size-ratio=0.5
line-height=20
letter-spacing=0

[colors]
background=11111bff
text=cdd6f4ff
match=b4befeff
selection=1e1e2eff
selection-text=cdd6f4ff
selection-match=b4befeff
border=b4befe30

[border]
width=1
radius=8
