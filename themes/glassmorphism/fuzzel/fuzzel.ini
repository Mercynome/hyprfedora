[main]
font=Inter:size=12
dpi-aware=auto
prompt=❯ 
icon-theme=Papirus
icons-enabled=yes
fields=filename,name,generic
password-character=*
fuzzy=yes
show-actions=yes
terminal=kitty -e

lines=10
width=45
horizontal-pad=24
vertical-pad=24
inner-pad=12

image-size-ratio=0.5
line-height=22
letter-spacing=0

[colors]
background=1a1b26a0
text=c0caf5ff
match=5bcefaff
selection=5bcefa30
selection-text=c0caf5ff
selection-match=5bcefaff
border=5bcefa40

[border]
width=1
radius=14
