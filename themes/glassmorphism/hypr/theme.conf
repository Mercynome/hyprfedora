# Anime Glassmorphism - Hyprland decoration overrides
decoration {
    rounding = 14
    active_opacity = 0.92
    inactive_opacity = 0.82

    shadow {
        enabled = true
        range = 25
        render_power = 3
        color = rgba(0, 0, 0, 0.5)
    }

    blur {
        enabled = true
        size = 14
        passes = 4
        vibrancy = 0.25
        noise = 0.015
        contrast = 0.9
        brightness = 0.85
        popups = true
    }
}

general {
    gaps_in = 5
    gaps_out = 12
    border_size = 2
    col.active_border = rgba(5bcefacc) rgba(7aa2f7cc) 45deg
    col.inactive_border = rgba(5bcefa15)
}
